<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todas las letras y traducciones | Arashi no naka de</title>
    <link href="/style.css" rel="stylesheet" type="text/css" media="all">
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="/scripts/tailwind-config.js"></script>

    <script type="module" src="/components/header/header-component.js"></script>
    <script type="module" src="/components/footer/footer-component.js"></script>
    <script type="module" src="/components/caret-icon/caret-icon-component.js"></script>
    <script type="module" src="/components/house-icon/house-icon-component.js"></script>
    <script type="module" src="/components/link-icon/link-icon-component.js"></script>
    <script type="module" src="/components/share-button/share-button-component.js"></script>
    <script type="module" src="/components/list/list-component.js"></script>


    <script type="text/javascript" src="/scripts/list.js"></script>
</head>

<body class="text-gray-800 font-sans">
    <header-component></header-component>
    <main class="max-w-6xl mx-auto pb-6 pt-3">
        <div class="bg-white p-6 md:p-12 rounded-lg shadow-sm">
            <h2 class="post-title text-2xl md:text-3xl">Todas las letras y traducciones</h2>
            <div class="post-body pt-7">
                <div class="img-container">
                    <img src="/images/arashi.jpg" alt="Arashi" class="md:max-w-[80%] mx-auto">
                </div>
                <div class="text-center my-6">
                    <div id="list-type-btn" class="inline-flex">
                        <button id="order-album-btn"
                            class="bg-blue-back hover:bg-blue-secondary hover:text-white text-black disabled:bg-blue-secondary disabled:bg-blue-secondary disabled:text-white disabled:cursor-default py-2 px-4 rounded-l-full disabled"
                            disabled>
                            Por álbum
                        </button>
                        <button id="order-alpha-btn"
                            class="bg-blue-back hover:bg-blue-secondary hover:text-white text-black disabled:bg-blue-secondary disabled:bg-blue-secondary disabled:text-white disabled:cursor-default py-2 px-4 rounded-r-full">
                            Por orden alfabético
                        </button>
                    </div>
                </div>
                <div id="by-album-list">
                </div>
                <div id="alphabetical-list" hidden>
                </div>
            </div>
            <hr class="w-2/3 mx-auto my-8" />
            <div class="flex justify-evenly">
                <share-button-component></share-button-component>
                <a href="/index.html"
                    class="bg-blue-secondary text-white pt-1 pb-2 px-4 rounded-full hover:bg-blue-link"><house-icon-component
                        class="mr-2"></house-icon-component><span class="align-middle">Volver a Inicio</span></a>
            </div>
        </div>
    </main>
    <footer-component></footer-component>
</body>

</html>
